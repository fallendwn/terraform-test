global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'authservice'
    static_configs:
      - targets: ['authservice:8081']
    metrics_path: /metrics

  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:8080']
    metrics_path: /metrics
