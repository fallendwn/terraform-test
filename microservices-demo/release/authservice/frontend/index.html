<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Service — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 44px;
      width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #4f8ef7, #3a7be0);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 16px;
    }
    h1 { font-size: 22px; margin-bottom: 4px; color: #1a1a2e; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 28px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #f0f2f5; padding: 4px; border-radius: 10px; }
    .tab {
      flex: 1; padding: 9px; border: none; border-radius: 7px;
      cursor: pointer; font-size: 14px; font-weight: 500;
      background: transparent; color: #888; transition: all .2s;
    }
    .tab.active { background: white; color: #1a1a2e; box-shadow: 0 1px 6px rgba(0,0,0,0.12); }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0;
      border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none; transition: border .2s;
    }
    input:focus { border-color: #4f8ef7; box-shadow: 0 0 0 3px rgba(79,142,247,0.1); }
    button.submit {
      width: 100%; padding: 12px; background: linear-gradient(135deg, #4f8ef7, #3a7be0);
      color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity .2s; margin-top: 4px;
    }
    button.submit:hover { opacity: 0.9; }
    button.submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { margin-top: 14px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
    .msg.error { background: #ffeaea; color: #d32f2f; display: block; }
    .msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .profile-card { display: none; }
    .avatar {
      width: 56px; height: 56px; background: linear-gradient(135deg, #4f8ef7, #3a7be0);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin-bottom: 16px;
    }
    .profile-card h2 { font-size: 18px; margin-bottom: 16px; color: #1a1a2e; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f2f5; font-size: 14px; }
    .info-row .label { color: #888; }
    .info-row .value { color: #1a1a2e; font-weight: 500; }
    .token-section { margin: 16px 0; }
    .token-label { font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    .token-box {
      background: #f5f7fa; border-radius: 8px; padding: 10px 12px;
      font-size: 11px; word-break: break-all; color: #555; font-family: monospace;
      max-height: 60px; overflow: hidden; border: 1px solid #e8eaed;
    }
    .btn-logout {
      width: 100%; padding: 10px; background: #fff; color: #d32f2f;
      border: 1.5px solid #d32f2f; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600; margin-top: 16px; transition: all .2s;
    }
    .btn-logout:hover { background: #ffeaea; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ffffff40; border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div id="authView">
    <a href="/" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#888;text-decoration:none;margin-bottom:18px;">← Back to Shop</a>
    <div class="logo">🔐</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account or create a new one</p>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="loginForm">
      <label>Username</label>
      <input id="loginUser" type="text" placeholder="Enter username" onkeydown="if(event.key==='Enter')doLogin()">
      <label>Password</label>
      <input id="loginPass" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="submit" id="loginBtn" onclick="doLogin()">Sign In</button>
    </div>

    <div id="registerForm" style="display:none">
      <label>Username</label>
      <input id="regUser" type="text" placeholder="Choose username">
      <label>Email</label>
      <input id="regEmail" type="email" placeholder="your@email.com">
      <label>Password</label>
      <input id="regPass" type="password" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')doRegister()">
      <button class="submit" id="registerBtn" onclick="doRegister()">Create Account</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <div class="profile-card" id="profileView">
    <div class="avatar">👤</div>
    <h2>You're logged in</h2>
    <div class="info-row"><span class="label">Username</span><span class="value" id="profUser"></span></div>
    <div class="info-row"><span class="label">Email</span><span class="value" id="profEmail"></span></div>
    <div class="info-row"><span class="label">Joined</span><span class="value" id="profDate"></span></div>
    <div class="token-section">
      <div class="token-label">JWT Token</div>
      <div class="token-box" id="profToken"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<script>
  const API = '/api/auth';
  let token = localStorage.getItem('auth_token');

  if (token) loadProfile();

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1))
    );
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    showMsg('', '');
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + (text ? type : '');
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    if (loading) {
      btn.dataset.original = btn.textContent;
      btn.innerHTML = '<span class="spinner"></span>Loading...';
    } else {
      btn.textContent = btn.dataset.original || btn.textContent;
    }
  }

  async function doLogin() {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value;
    if (!username || !password) return showMsg('Please fill in all fields', 'error');

    setLoading('loginBtn', true);
    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) return showMsg(data.detail || 'Login failed', 'error');

      token = data.access_token;
      localStorage.setItem('auth_token', token);
      showMsg('Login successful!', 'success');
      setTimeout(loadProfile, 400);
    } catch (e) {
      showMsg('Connection error. Is the auth service running?', 'error');
    } finally {
      setLoading('loginBtn', false);
    }
  }

  async function doRegister() {
    const username = document.getElementById('regUser').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPass').value;
    if (!username || !email || !password) return showMsg('Please fill in all fields', 'error');

    setLoading('registerBtn', true);
    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (!res.ok) return showMsg(data.detail || 'Registration failed', 'error');

      token = data.access_token;
      localStorage.setItem('auth_token', token);
      showMsg('Account created successfully!', 'success');
      setTimeout(loadProfile, 400);
    } catch (e) {
      showMsg('Connection error. Is the auth service running?', 'error');
    } finally {
      setLoading('registerBtn', false);
    }
  }

  async function loadProfile() {
    try {
      const res = await fetch(`${API}/me`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) {
        localStorage.removeItem('auth_token');
        token = null;
        return;
      }
      const user = await res.json();

      document.getElementById('authView').style.display = 'none';
      document.getElementById('profileView').style.display = 'block';
      document.getElementById('profUser').textContent = user.username;
      document.getElementById('profEmail').textContent = user.email;
      document.getElementById('profDate').textContent = new Date(user.created_at).toLocaleString();
      document.getElementById('profToken').textContent = token;
    } catch (e) {
      localStorage.removeItem('auth_token');
    }
  }

  function doLogout() {
    if (token) {
      fetch(`${API}/logout`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      }).catch(() => {});
    }
    localStorage.removeItem('auth_token');
    token = null;
    document.getElementById('authView').style.display = 'block';
    document.getElementById('profileView').style.display = 'none';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
  }
</script>
</body>
</html>
