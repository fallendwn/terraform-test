server {
    listen 80;

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    sub_filter_once off;
    sub_filter_types text/html;

    location /auth/ {
        proxy_pass http://auth-frontend:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";
    }

    location /api/auth/ {
        rewrite ^/api/auth/(.*) /$1 break;
        proxy_pass http://authservice:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        if ($request_method = OPTIONS) { return 204; }
    }

    location / {
        proxy_pass http://frontend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Encoding "";

        sub_filter '</body>' '<style>
  #auth-nav-btn {
    position:fixed;top:16px;right:20px;z-index:9999;
    background:linear-gradient(135deg,#4f8ef7,#3a7be0);
    color:white;border:none;border-radius:24px;padding:10px 22px;
    font-size:14px;font-weight:600;font-family:"Segoe UI",sans-serif;
    cursor:pointer;box-shadow:0 4px 14px rgba(79,142,247,.4);
    text-decoration:none;display:flex;align-items:center;gap:8px;
    transition:opacity .2s,transform .2s;
  }
  #auth-nav-btn:hover{opacity:.9;transform:translateY(-1px);}
  #auth-user-badge {
    position:fixed;top:16px;right:20px;z-index:9999;
    background:white;border:2px solid #4f8ef7;border-radius:24px;
    padding:8px 18px;font-size:14px;font-weight:600;
    font-family:"Segoe UI",sans-serif;color:#1a1a2e;
    display:none;align-items:center;gap:10px;
    box-shadow:0 4px 14px rgba(0,0,0,.1);
  }
  #auth-user-badge .un{color:#4f8ef7;}
  #auth-logout-btn{background:none;border:none;color:#d32f2f;cursor:pointer;font-size:12px;font-weight:600;padding:2px 6px;border-radius:4px;}
  #auth-logout-btn:hover{background:#ffeaea;}
</style>
<a id="auth-nav-btn" href="/auth/">&#128274; Sign In</a>
<div id="auth-user-badge">
  &#128100; <span class="un" id="nav-username"></span>
  <button id="auth-logout-btn" onclick="navLogout()">Sign out</button>
</div>
<script>
(function(){
  var t=localStorage.getItem("auth_token");
  if(!t)return;
  fetch("/api/auth/me",{headers:{"Authorization":"Bearer "+t}})
    .then(function(r){return r.ok?r.json():Promise.reject();})
    .then(function(u){
      document.getElementById("auth-nav-btn").style.display="none";
      var b=document.getElementById("auth-user-badge");
      b.style.display="flex";
      document.getElementById("nav-username").textContent=u.username;
    })
    .catch(function(){localStorage.removeItem("auth_token");});
})();
function navLogout(){
  var t=localStorage.getItem("auth_token");
  if(t)fetch("/api/auth/logout",{method:"POST",headers:{"Authorization":"Bearer "+t}}).catch(function(){});
  localStorage.removeItem("auth_token");
  document.getElementById("auth-nav-btn").style.display="flex";
  document.getElementById("auth-user-badge").style.display="none";
}
</script>
</body>';
    }
}
